# Codex project configuration equivalent to the safety/behavior parts of
# .claude/settings.json.
#
# Claude-only settings intentionally not mirrored:
# - $schema: JSON-schema metadata for Claude settings only.
# - CLAUDE_CODE_NO_FLICKER: Claude Code UI-only environment variable.
# - CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: no percentage-based Codex equivalent.

# Equivalent to Claude's effortLevel: "high".
model_reasoning_effort = "high"

# Closest project-level equivalent to Claude's defaultMode: "bypassPermissions".
# Keep the filesystem deny profile below active so sensitive files still stay
# unreadable while avoiding routine approval prompts.
approval_policy = "never"
default_permissions = "agent_container"

[features]
# Equivalent to autoMemoryEnabled: false.
memories = false
hooks = true

[permissions.agent_container.filesystem]
glob_scan_max_depth = 6
":minimal" = "read"
"/memory-bank-template" = "deny"
"/clinerules-bank" = "deny"
"/convert2md_scripts/.venv" = "deny"
"/convert2md_scripts/設計書" = "deny"
"/convert2md_scripts/excel2md_batch.py" = "deny"
"/convert2md_scripts/PROXY_SETUP_GUIDE.md" = "deny"
"/convert2md_scripts/README.md" = "deny"
"/convert2md_scripts/run.cmd" = "deny"
"/convert2md_scripts/requirements.txt" = "deny"

[permissions.agent_container.filesystem.":workspace_roots"]
"." = "write"
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/.env.development.local" = "deny"
"**/.env.test.local" = "deny"
"**/.env.production.local" = "deny"
"target" = "deny"
"pom.xml.tag" = "deny"
"pom.xml.releaseBackup" = "deny"
"pom.xml.versionsBackup" = "deny"
"pom.xml.next" = "deny"
"release.properties" = "deny"
"dependency-reduced-pom.xml" = "deny"
"buildNumber.properties" = "deny"
".mvn/timing.properties" = "deny"
".mvn/wrapper/maven-wrapper.jar" = "deny"
"**/*.class" = "deny"
"**/*.jar" = "deny"
"**/*.war" = "deny"
"**/*.ear" = "deny"
"**/*.nar" = "deny"
"**/hs_err_pid*" = "deny"
"**/replay_pid*" = "deny"
".idea" = "deny"
"**/*.iws" = "deny"
"**/*.iml" = "deny"
"**/*.ipr" = "deny"
"**/.apt_generated" = "deny"
"**/.classpath" = "deny"
"**/.factorypath" = "deny"
"**/.project" = "deny"
"**/.settings" = "deny"
"**/.springBeans" = "deny"
"**/.sts4-cache" = "deny"
".vscode" = "deny"
"**/*.code-workspace" = "deny"
"**/.DS_Store" = "deny"
"**/.DS_Store?" = "deny"
"**/._*" = "deny"
"**/.Spotlight-V100" = "deny"
"**/.Trashes" = "deny"
"**/ehthumbs.db" = "deny"
"**/Thumbs.db" = "deny"
"**/*.swp" = "deny"
"**/*.swo" = "deny"
"**/*~" = "deny"
"logs" = "deny"
"**/*.log" = "deny"
"**/*.log.*" = "deny"
"temp" = "deny"
"tmp" = "deny"
"**/*.db" = "deny"
"**/*.trace.db" = "deny"
"**/*.lock.db" = "deny"
"**/application-local.yml" = "deny"
